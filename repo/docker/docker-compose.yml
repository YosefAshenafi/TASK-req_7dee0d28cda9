services:
  db:
    image: postgres:16-alpine
    container_name: fulfillops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fulfillops
      POSTGRES_USER: fulfillops
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fulfillops_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulfillops -d fulfillops"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fulfillops-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://fulfillops:${DB_PASSWORD:-fulfillops_dev}@db:5432/fulfillops?sslmode=disable
      FULFILLOPS_ENCRYPTION_KEY_PATH: /app/encryption.key
      FULFILLOPS_EXPORT_DIR: /app/exports
      FULFILLOPS_BACKUP_DIR: /app/backups
      FULFILLOPS_PORT: 8080
      FULFILLOPS_SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-prod!!}
      GIN_MODE: ${GIN_MODE:-debug}
    ports:
      - "8080:8080"
    volumes:
      - ../migrations:/app/migrations:ro
      - app_exports:/app/exports
      - app_backups:/app/backups
      - ${ENCRYPTION_KEY_FILE:-./encryption.key.dev}:/app/encryption.key:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  app_exports:
  app_backups:
